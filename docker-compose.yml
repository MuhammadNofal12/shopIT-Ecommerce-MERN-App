# version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: shopit-backend

    ports:
      - "4000:4000"

    env_file:
      - backend/config/config.env

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: shopit-frontend

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm start

    depends_on:
      - backend
