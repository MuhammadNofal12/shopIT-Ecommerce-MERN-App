name: ShopIT CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3 - Build Backend Docker Image
      - name: Build Backend Image
        run: |
          docker build -t shopit-backend ./ -f Dockerfile

      # Step 4 - Build Frontend Docker Image
      - name: Build Frontend Image
        run: |
          docker build -t shopit-frontend ./frontend -f frontend/Dockerfile

      # Step 5 - Success Message
      - name: Pipeline Finished
        run: echo "✅ ShopIT Docker images built successfully!"
